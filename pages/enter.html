<h2>Stel hier je team samen</h2>

<form id="team-form">

    <div class="form-group">
        <label for="player-name">Teamnaam *</label>
        <input
            type="text"
            id="player-name"
            name="playerName"
            required
        >
    </div>

    <div class="form-group">
        <label for="player-pin">Team PIN * <span class="field-hint">(4 cijfers — kies de 1e keer een PIN. Voer deze later 
            weer in om een bestaand team aan te passen.</span></label>
        <input
            type="text"
            id="player-pin"
            name="pin"
            inputmode="numeric"
            pattern="[0-9]{4}"
            maxlength="4"
            autocomplete="off"
            required
        >
    </div>

    <p id="lookup-message" class="form-message"></p>

    <h3>Kies je <span id="riders-heading-count">20</span> renners</h3>

    <p id="selection-counter"></p>

    <div class="rider-picker">

        <div class="rider-picker-column">
            <label for="rider-search-input">Zoek renner</label>
            <input
                type="text"
                id="rider-search-input"
                placeholder="Zoek op naam of team..."
                autocomplete="off"
            >
            <div id="rider-available-list" class="rider-list"></div>
        </div>

        <div class="rider-picker-column">
            <label>Jouw team</label>
            <div id="rider-selected-list" class="rider-list rider-selected-list"></div>
        </div>

    </div>

    <p id="form-message" class="form-message"></p>

    <button
        id="submit-btn"
        type="submit"
        disabled
    >
        Bevestig team
    </button>

</form>
