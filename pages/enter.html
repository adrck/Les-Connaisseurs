<h2>Enter Your Team</h2>

<form id="team-form">

    <div class="form-group">
        <label for="player-name">Player Name *</label>
        <input
            type="text"
            id="player-name"
            name="playerName"
            required
        >
    </div>

    <div class="form-group">
        <label for="email">Email (optional)</label>
        <input
            type="email"
            id="email"
            name="email"
        >
    </div>

    <h3>Select Your 8 Riders</h3>

    <div id="rider-selectors"></div>

<p id="form-message" class="form-message"></p>

<button
    id="submit-btn"
    type="submit"
    disabled
>
    Submit Team
</button>

</form>
