<div class="card">

    <h2>Enter Your Team</h2>

    <form id="teamForm">

        <label for="playerName">Your Name</label>
        <input
            type="text"
            id="playerName"
            placeholder="John Smith"
            required
        >

        <label for="playerEmail">Email (optional)</label>
        <input
            type="email"
            id="playerEmail"
            placeholder="john@email.com"
        >

        <hr>

        <h3>
            Budget Remaining:
            €<span id="remainingBudget">120</span>
        </h3>

        <p>
            Total Cost:
            €<span id="totalCost">0</span>
        </p>

        <div id="riderSelections"></div>

        <button
            id="submitButton"
            type="submit"
            disabled
        >
            Submit Team
        </button>

    </form>

</div>
