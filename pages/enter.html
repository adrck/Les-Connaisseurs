<h2>Enter Your Team</h2>

<form id="team-form">

    <div class="form-group">
        <label for="player-name">Player Name *</label>
        <input
            type="text"
            id="player-name"
            name="playerName"
            required
        >
    </div>

    <div class="form-group">
        <label for="player-pin">Team PIN * <span class="field-hint">(4 digits — choose one the first time, use the same one to make changes later)</span></label>
        <input
            type="text"
            id="player-pin"
            name="pin"
            inputmode="numeric"
            pattern="[0-9]{4}"
            maxlength="4"
            autocomplete="off"
            required
        >
    </div>

    <p id="lookup-message" class="form-message"></p>

    <h3>Select Your <span id="riders-heading-count">20</span> Riders</h3>

    <p id="selection-counter"></p>

    <div class="rider-picker">

        <div class="rider-picker-column">
            <label for="rider-search-input">Search riders</label>
            <input
                type="text"
                id="rider-search-input"
                placeholder="Search by name or team..."
                autocomplete="off"
            >
            <div id="rider-available-list" class="rider-list"></div>
        </div>

        <div class="rider-picker-column">
            <label>Your Team</label>
            <div id="rider-selected-list" class="rider-list rider-selected-list"></div>
        </div>

    </div>

    <p id="form-message" class="form-message"></p>

    <button
        id="submit-btn"
        type="submit"
        disabled
    >
        Submit Team
    </button>

</form>
