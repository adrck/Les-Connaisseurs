<div class="card">

<h2>Contact</h2>

<p>Vragen, feedback, of iets wat niet goed werkt? Stuur hieronder een bericht.</p>

<form id="contact-form">

    <div class="form-group">
        <label for="contact-name">Naam (optioneel)</label>
        <input
            type="text"
            id="contact-name"
            name="name"
        >
    </div>

    <div class="form-group">
        <label for="contact-email">Email (optioneel, alleen als je mail terug wilt ontvangen)</label>
        <input
            type="email"
            id="contact-email"
            name="email"
        >
    </div>

    <div class="form-group">
        <label for="contact-message">Bericht *</label>
        <textarea
            id="contact-message"
            name="message"
            rows="6"
            required
        ></textarea>
    </div>

    <p id="contact-message-status" class="form-message"></p>

    <button
        id="contact-submit-btn"
        type="submit"
    >
        Send
    </button>

</form>

</div>
