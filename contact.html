<div class="card">

<h2>Contact</h2>

<p>Questions, feedback, or something not working right? Send a message below.</p>

<form id="contact-form">

    <div class="form-group">
        <label for="contact-name">Name (optional)</label>
        <input
            type="text"
            id="contact-name"
            name="name"
        >
    </div>

    <div class="form-group">
        <label for="contact-email">Email (optional, in case a reply is useful)</label>
        <input
            type="email"
            id="contact-email"
            name="email"
        >
    </div>

    <div class="form-group">
        <label for="contact-message">Message *</label>
        <textarea
            id="contact-message"
            name="message"
            rows="6"
            required
        ></textarea>
    </div>

    <p id="contact-message-status" class="form-message"></p>

    <button
        id="contact-submit-btn"
        type="submit"
    >
        Send
    </button>

</form>

</div>
